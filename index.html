<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>쩝쩝박사 맛집지도</title>
    
    <!-- 1. 외부 라이브러리 (CSS) - 최우선 로드 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        :root {
            --bg: #111; --card: #222; --point: #ff3b30; --text: #eee;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 헤더 및 필터 */
        #hd { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(17,17,17,0.8); backdrop-filter: blur(10px); padding-top: env(safe-area-inset-top); }
        .tabs { display: flex; padding: 10px; gap: 8px; overflow-x: auto; }
        .tab { padding: 8px 16px; border-radius: 20px; background: #333; font-size: 14px; white-space: nowrap; cursor: pointer; }
        .tab.on { background: var(--point); font-weight: bold; }

        /* 지도 영역 */
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* 바텀 시트 및 상세정보 */
        #sh { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--card); z-index: 2000; transition: 0.3s; border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        #sh.on { bottom: 0; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; display: none; }
        #ov.on { display: block; }
        
        .btn-link { display: block; width: 100%; padding: 15px; background: #fee500; color: #000; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        
        /* 리스트 뷰 (선택사항) */
        #list-container { display: none; } /* 일단 지도를 메인으로 설정 */
    </style>
</head>
<body>

    <header id="hd">
        <div class="tabs">
            <div class="tab on">전체</div>
            <div class="tab">맛집</div>
            <div class="tab">카페</div>
            <div class="tab">술집</div>
        </div>
    </header>

    <div id="map"></div>
    <div id="ov"></div>

    <!-- 바텀 시트 (상세정보 창) -->
    <div id="sh">
        <div style="width:40px; height:4px; background:#444; margin:0 auto 15px; border-radius:2px;"></div>
        <h2 id="sn" style="margin:0 0 8px 0; font-size:22px;">가게명</h2>
        <p id="sa" style="margin:0 0 12px 0; color:#aaa; font-size:14px;">주소 정보</p>
        <div id="sm" style="background:#333; padding:15px; border-radius:10px; font-size:15px; line-height:1.5;">메모 내용</div>
        <a id="klink" href="#" target="_blank" class="btn-link">카카오맵에서 길찾기</a>
    </div>

    <!-- 2. 외부 라이브러리 (JS) - 코드 실행 전 로드 필수 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        // 1. 데이터 정의 (CORS 에러 방지를 위해 내부에 선언)
        const PLACES = [
            { name: "맛있겠다", lat: 37.5665, lng: 126.9780, cate: "맛집", address: "서울 중구 태평로1가 31", memo: "시청 근처 가성비 최고 맛집!" },
            { name: "분위기카페", lat: 37.5511, lng: 126.9882, cate: "카페", address: "서울 용산구 남산공원길 105", memo: "전망이 끝내주는 카페입니다." }
            // 여기에 더 많은 데이터를 추가하세요.
        ];

        // 2. 지도 초기화
        const map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 13);
        
        // 다크모드 타일 적용 (반드시 HTTPS 사용)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = L.markerClusterGroup();
        const bottomSheet = document.getElementById('sh');
        const overlay = document.getElementById('ov');

        // 3. 기능 함수
        function showDetail(p) {
            document.getElementById('sn').innerText = p.name;
            document.getElementById('sa').innerText = p.address;
            document.getElementById('sm').innerText = p.memo;
            document.getElementById('klink').href = `https://map.kakao.com/link/to/${p.name},${p.lat},${p.lng}`;
            bottomSheet.classList.add('on');
            overlay.classList.add('on');
        }

        function closeDetail() {
            bottomSheet.classList.remove('on');
            overlay.classList.remove('on');
        }

        function renderMarkers(filter = '전체') {
            markers.clearLayers();
            const filtered = filter === '전체' ? PLACES : PLACES.filter(p => p.cate === filter);
            
            filtered.forEach(p => {
                const m = L.marker([p.lat, p.lng]);
                m.on('click', () => {
                    map.panTo([p.lat, p.lng]);
                    showDetail(p);
                });
                markers.addLayer(m);
            });
            map.addLayer(markers);
        }

        // 4. 이벤트 연결
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
                this.classList.add('on');
                renderMarkers(this.innerText);
            };
        });

        overlay.onclick = closeDetail;

        // 초기 렌더링
        renderMarkers();
    </script>
</body>
</html>
