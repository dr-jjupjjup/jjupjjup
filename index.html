<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쩝쩝박사">
<meta name="theme-color" content="#0f0f0f">
<title>쩝쩝박사</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
:root{--bg:#0f0f0f;--s:#1c1c1e;--s2:#2c2c2e;--b:rgba(255,255,255,0.1);--t:#f2f2f7;--t2:#8e8e93;--wc:#e8d5a3;--bc:#c084fc;--mc:#6ee7b7;--ac:#f5a623;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'Noto Sans KR',sans-serif;color:var(--t)}
#app{display:flex;flex-direction:column;height:100dvh;padding-top:var(--st)}
#hdr{background:rgba(28,28,30,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px;display:flex;align-items:center;gap:9px;border-bottom:.5px solid var(--b);flex-shrink:0}
.logo{font-size:15px;font-weight:700;white-space:nowrap;flex-shrink:0}.logo span{color:var(--ac)}
#sw{flex:1;position:relative}
#si{width:100%;background:var(--s2);border:none;color:var(--t);border-radius:10px;padding:8px 12px 8px 30px;font-size:14px;outline:none;-webkit-appearance:none}
#si::placeholder{color:var(--t2)}
.sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
#bdg{background:var(--ac);color:#111;border-radius:10px;padding:4px 9px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
#fbar{background:rgba(28,28,30,0.92);backdrop-filter:blur(10px);padding:8px 14px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;border-bottom:.5px solid var(--b);scrollbar-width:none}
#fbar::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--b);background:var(--s2);color:var(--t2);border-radius:14px;padding:5px 11px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;user-select:none;transition:all .15s}
.chip.on{color:#111!important;border-color:transparent;font-weight:700}
.ca.on{background:var(--ac)}.cw.on{background:var(--wc)}.cb.on{background:var(--bc);color:#fff!important}.cm.on{background:var(--mc)}.cr.on{background:var(--ac)}
.dv{width:1px;background:var(--b);flex-shrink:0;margin:3px 2px}
#map{flex:1;z-index:0}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--s)!important;color:var(--t)!important;border:.5px solid var(--b)!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:16px!important}
.marker-cluster-small{background-color:rgba(245,166,35,0.2)!important}
.marker-cluster-small div{background-color:rgba(245,166,35,0.85)!important;color:#111!important;font-weight:700}
.marker-cluster-medium{background-color:rgba(230,100,20,0.2)!important}
.marker-cluster-medium div{background-color:rgba(230,100,20,0.85)!important;color:#fff!important;font-weight:700}
.marker-cluster-large{background-color:rgba(200,40,40,0.2)!important}
.marker-cluster-large div{background-color:rgba(200,40,40,0.85)!important;color:#fff!important;font-weight:700}
#lst{display:none;flex:1;overflow-y:auto;background:var(--bg);padding-bottom:var(--sb)}
#lst.on{display:block}
.li{display:flex;align-items:center;padding:12px 16px;border-bottom:.5px solid var(--b);gap:12px;cursor:pointer}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.linfo{flex:1;min-width:0}
.ln{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ls{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lr{font-size:11px;color:var(--ac);font-weight:600;flex-shrink:0}
#tab{background:rgba(28,28,30,0.96);backdrop-filter:blur(20px);border-top:.5px solid var(--b);display:flex;padding-bottom:var(--sb);flex-shrink:0}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 5px;cursor:pointer;color:var(--t2);font-size:10px;font-weight:500;gap:2px;user-select:none;transition:color .15s}
.tb.on{color:var(--ac)}.tbi{font-size:21px;line-height:1}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.45)}
#ov.on{display:block}
#sh{position:fixed;left:0;right:0;bottom:0;background:var(--s);border-radius:20px 20px 0 0;border-top:.5px solid var(--b);z-index:1000;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--sb)}
#sh.on{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--b);border-radius:2px;margin:12px auto 0}
#shi{padding:16px 20px 20px}
#stags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.stag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;display:inline-block}
.stag.w{background:rgba(232,213,163,0.15);color:var(--wc);border:1px solid rgba(232,213,163,0.3)}
.stag.b{background:rgba(192,132,252,0.15);color:var(--bc);border:1px solid rgba(192,132,252,0.3)}
.stag.m{background:rgba(110,231,183,0.15);color:var(--mc);border:1px solid rgba(110,231,183,0.3)}
.stag.r{background:rgba(245,166,35,0.12);color:var(--ac);border:1px solid rgba(245,166,35,0.25)}
#sn{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:5px;line-height:1.2}
#sa{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:12px}
#sm{font-size:14px;line-height:1.65;background:var(--s2);padding:12px 14px;border-radius:12px;border-left:3px solid var(--ac);color:var(--t)}
#sact{margin-top:14px}
.abtn{display:block;background:var(--ac);color:#111;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;width:100%}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">🍽️ <span>쩝쩝</span>박사</div>
    <div id="sw"><span class="sic">🔍</span><input type="search" id="si" placeholder="맛집, 셰프, 지역 검색..." autocomplete="off" autocorrect="off" spellcheck="false"></div>
    <div id="bdg">로딩중...</div>
  </div>
  <div id="fbar">
    <div class="chip ca on" data-cat="">전체</div>
    <div class="chip cw" data-cat="백스트리트">🏳️ 백스트리트</div>
    <div class="chip cb" data-cat="흑백요리사">🏴 흑백요리사</div>
    <div class="chip cm" data-cat="직접저장">⭐ 직접저장</div>
    <div class="dv"></div>
    <div class="chip cr on" data-reg="">전국</div>
    <div class="chip cr" data-reg="서울">서울</div>
    <div class="chip cr" data-reg="경기">경기</div>
    <div class="chip cr" data-reg="부산">부산</div>
    <div class="chip cr" data-reg="인천">인천</div>
    <div class="chip cr" data-reg="제주">제주</div>
    <div class="chip cr" data-reg="강원">강원</div>
  </div>
  <div id="map"></div>
  <div id="lst"></div>
  <div id="tab">
    <div class="tb on" id="t0" data-tab="map"><span class="tbi">🗺️</span>지도</div>
    <div class="tb" id="t1" data-tab="list"><span class="tbi">📋</span>목록</div>
  </div>
</div>
<div id="ov"></div>
<div id="sh">
  <div class="hdl"></div>
  <div id="shi">
    <div id="stags"></div>
    <div id="sn"></div>
    <div id="sa"></div>
    <div id="sm"></div>
    <div id="sact"><a id="klink" class="abtn" target="_blank">카카오맵으로 보기 🗺️</a></div>
  </div>
</div>

var CC = {'백스트리트':'#e8d5a3','흑백요리사':'#c084fc','직접저장':'#6ee7b7'};
var CL = {'백스트리트':'w','흑백요리사':'b','직접저장':'m'};
var CI = {'백스트리트':'🏳️','흑백요리사':'🏴','직접저장':'⭐'};

var map = L.map('map', {zoomControl:false, attributionControl:false}).setView([37.5665, 126.978], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function mkIcon(cat) {
  var c = CC[cat] || '#f5a623';
  return L.divIcon({
    html: '<div style="width:13px;height:13px;border-radius:50%;background:' + c + ';border:2px solid rgba(0,0,0,0.5);box-shadow:0 2px 6px rgba(0,0,0,0.6)"></div>',
    className: '', iconSize:[13,13], iconAnchor:[6,6]
  });
}

var cluster = L.markerClusterGroup({maxClusterRadius:55, showCoverageOnHover:false});
var MK = [];

for (var i = 0; i < PLACES.length; i++) {
  var p = PLACES[i];
  if (!p.lat || !p.lng) continue;
  var m = L.marker([p.lat, p.lng], {icon: mkIcon(p.category)});
  m._p = p;
  (function(place) {
    m.on('click', function() { opn(place); });
  })(p);
  MK.push(m);
}

cluster.addLayers(MK);
map.addLayer(cluster);

var FT = MK.slice();
document.getElementById('bdg').textContent = FT.length + '곳';

var aC = '', aR = '';

var catChips = document.querySelectorAll('.chip[data-cat]');
for (var i = 0; i < catChips.length; i++) {
  catChips[i].addEventListener('click', function() {
    aC = this.dataset.cat;
    for (var j = 0; j < catChips.length; j++) catChips[j].classList.remove('on');
    this.classList.add('on');
    fil();
  });
}

var regChips = document.querySelectorAll('.chip[data-reg]');
for (var i = 0; i < regChips.length; i++) {
  regChips[i].addEventListener('click', function() {
    aR = this.dataset.reg;
    for (var j = 0; j < regChips.length; j++) regChips[j].classList.remove('on');
    this.classList.add('on');
    fil();
  });
}

document.getElementById('si').addEventListener('input', fil);

function fil() {
  var q = document.getElementById('si').value.toLowerCase().trim();
  FT = [];
  for (var i = 0; i < MK.length; i++) {
    var p = MK[i]._p;
    var mc = !aC || p.category === aC;
    var mr = !aR || p.region === aR;
    var txt = (p.name + (p.memo||'') + (p.address||'')).toLowerCase();
    var mq = !q || txt.indexOf(q) >= 0;
    if (mc && mr && mq) FT.push(MK[i]);
  }
  cluster.clearLayers();
  cluster.addLayers(FT);
  document.getElementById('bdg').textContent = FT.length + '곳';
  if (curTab === 'list') rl();
}

var curSel = null;
function opn(p) {
  curSel = p;
  var cl2 = CL[p.category] || 'm';
  var ic = CI[p.category] || '📍';
  document.getElementById('stags').innerHTML =
    '<span class="stag ' + cl2 + '">' + ic + ' ' + p.category + '</span>' +
    '<span class="stag r">' + (p.region||'기타') + (p.district ? ' ' + p.district : '') + '</span>';
  document.getElementById('sn').textContent = p.name;
  document.getElementById('sa').textContent = p.address || '';
  var me = p.memo || '';
  var mel = document.getElementById('sm');
  mel.style.display = me ? 'block' : 'none';
  mel.textContent = me;
  document.getElementById('klink').href = 'https://map.kakao.com/link/search/' + encodeURIComponent(p.name);
  document.getElementById('sh').classList.add('on');
  document.getElementById('ov').classList.add('on');
  map.panTo([p.lat, p.lng], {animate:true, duration:0.4});
}

function cls() {
  document.getElementById('sh').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}
document.getElementById('ov').addEventListener('click', cls);

var sy = 0;
document.getElementById('sh').addEventListener('touchstart', function(e) { sy = e.touches[0].clientY; }, {passive:true});
document.getElementById('sh').addEventListener('touchend', function(e) { if (e.changedTouches[0].clientY - sy > 80) cls(); }, {passive:true});

var curTab = 'map';
var tabs = document.querySelectorAll('.tb');
for (var i = 0; i < tabs.length; i++) {
  tabs[i].addEventListener('click', function() {
    curTab = this.dataset.tab;
    document.getElementById('map').style.display = curTab === 'map' ? 'block' : 'none';
    document.getElementById('lst').classList.toggle('on', curTab === 'list');
    document.getElementById('t0').classList.toggle('on', curTab === 'map');
    document.getElementById('t1').classList.toggle('on', curTab === 'list');
    if (curTab === 'list') rl(); else map.invalidateSize();
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rl() {
  var el = document.getElementById('lst');
  var html = '';
  for (var i = 0; i < FT.length; i++) {
    var p = FT[i]._p;
    var c = CC[p.category] || '#f5a623';
    var sub = p.memo ? p.memo.slice(0,50) : (p.address||'');
    html += '<div class="li" data-idx="' + MK.indexOf(FT[i]) + '">';
    html += '<div class="ld" style="background:' + c + '"></div>';
    html += '<div class="linfo"><div class="ln">' + esc(p.name) + '</div>';
    html += '<div class="ls">' + esc(sub) + '</div></div>';
    html += '<div class="lr">' + esc(p.district||p.region||'') + '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
  var items = el.querySelectorAll('.li');
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener('click', function() {
      var idx = parseInt(this.dataset.idx);
      var p = MK[idx]._p;
      curTab = 'map';
      document.getElementById('map').style.display = 'block';
      document.getElementById('lst').classList.remove('on');
      document.getElementById('t0').classList.add('on');
      document.getElementById('t1').classList.remove('on');
      map.invalidateSize();
      setTimeout(function() { opn(p); }, 300);
    });
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
