<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쩝쩝박사">
<meta name="theme-color" content="#0f0f0f">
<title>쩝쩝박사</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --border: rgba(255,255,255,0.1);
  --text: #f2f2f7;
  --text2: #8e8e93;
  --white-color: #e8d5a3;
  --black-color: #c084fc;
  --my-color: #6ee7b7;
  --accent: #f5a623;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, 'Noto Sans KR', sans-serif; color: var(--text); }

/* STATUS BAR AREA */
#app { display: flex; flex-direction: column; height: 100dvh; padding-top: var(--safe-top); }

/* HEADER */
#header {
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 15px; font-weight: 700; white-space: nowrap; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
#search-wrap { flex: 1; position: relative; }
#search {
  width: 100%;
  background: var(--surface2);
  border: none;
  color: var(--text);
  border-radius: 10px;
  padding: 8px 12px 8px 32px;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}
#search::placeholder { color: var(--text2); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; }
#badge {
  background: var(--accent);
  color: #111;
  border-radius: 10px;
  padding: 4px 9px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* FILTER */
#filter-bar {
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 8px 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
  scrollbar-width: none;
}
#filter-bar::-webkit-scrollbar { display: none; }
.chip {
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  border-radius: 14px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  user-select: none;
}
.chip.on { color: #111 !important; border-color: transparent; font-weight: 700; }
.chip.all.on { background: var(--accent); }
.chip.white.on { background: var(--white-color); }
.chip.black.on { background: var(--black-color); color: white !important; }
.chip.my.on { background: var(--my-color); }
.chip.region.on { background: var(--accent); }
.divider { width: 1px; background: var(--border); flex-shrink: 0; margin: 4px 2px; }

/* MAP */
#map { flex: 1; }
.leaflet-control-zoom { border: none !important; }
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 0.5px solid var(--border) !important;
  width: 36px !important;
  height: 36px !important;
  line-height: 36px !important;
  font-size: 18px !important;
}
.marker-cluster-small { background-color: rgba(245,166,35,0.2) !important; }
.marker-cluster-small div { background-color: rgba(245,166,35,0.85) !important; color: #111 !important; font-weight: 700; }
.marker-cluster-medium { background-color: rgba(245,166,35,0.2) !important; }
.marker-cluster-medium div { background-color: rgba(245,100,20,0.85) !important; color: white !important; font-weight: 700; }
.marker-cluster-large { background-color: rgba(220,50,50,0.2) !important; }
.marker-cluster-large div { background-color: rgba(200,40,40,0.85) !important; color: white !important; font-weight: 700; }

/* BOTTOM SHEET */
#overlay { display:none; position:fixed; inset:0; z-index:900; background: rgba(0,0,0,0.4); }
#overlay.on { display:block; }
#sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 0.5px solid var(--border);
  z-index: 1000;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  padding-bottom: var(--safe-bot);
  will-change: transform;
}
#sheet.on { transform: translateY(0); }
.handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
#sheet-inner { padding: 16px 20px 20px; }
#sheet-tags { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
.stag {
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 10px;
  display: inline-block;
}
.stag.white { background: rgba(232,213,163,0.15); color: var(--white-color); border: 1px solid rgba(232,213,163,0.3); }
.stag.black { background: rgba(192,132,252,0.15); color: var(--black-color); border: 1px solid rgba(192,132,252,0.3); }
.stag.my { background: rgba(110,231,183,0.15); color: var(--my-color); border: 1px solid rgba(110,231,183,0.3); }
.stag.region-tag { background: rgba(245,166,35,0.12); color: var(--accent); border: 1px solid rgba(245,166,35,0.25); }
#sheet-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 5px; line-height: 1.2; }
#sheet-addr { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
#sheet-memo {
  font-size: 14px; line-height: 1.65;
  background: var(--surface2);
  padding: 12px 14px;
  border-radius: 12px;
  border-left: 3px solid var(--accent);
  color: var(--text);
}
#sheet-actions { display: flex; gap: 8px; margin-top: 14px; }
.action-btn {
  flex: 1;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 11px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  display: block;
}
.action-btn.primary { background: var(--accent); color: #111; border-color: transparent; }

/* LIST VIEW */
#list-view {
  display: none;
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 8px 0;
  padding-bottom: var(--safe-bot);
}
#list-view.on { display: block; }
.list-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  gap: 12px;
  cursor: pointer;
  active: background: var(--surface2);
}
.list-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.list-sub { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-region { font-size: 11px; color: var(--accent); font-weight: 600; flex-shrink: 0; }

/* TAB BAR */
#tabbar {
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bot);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0 6px;
  cursor: pointer;
  color: var(--text2);
  font-size: 10px;
  font-weight: 500;
  gap: 2px;
  user-select: none;
  transition: color 0.15s;
}
.tab.on { color: var(--accent); }
.tab-icon { font-size: 22px; line-height: 1; }

/* INSTALL BANNER */
#install-banner {
  display: none;
  background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
  border-bottom: 0.5px solid var(--border);
  padding: 10px 16px;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#install-banner.on { display: flex; }
.install-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
.install-text strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 1px; }
#install-btn { background: var(--accent); color: #111; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
#dismiss-btn { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">

  <!-- Install Banner -->
  <div id="install-banner">
    <div class="install-text">
      <strong>홈 화면에 추가하기</strong>
      앱처럼 사용할 수 있어요
    </div>
    <button id="install-btn">설치</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <!-- Header -->
  <div id="header">
    <div class="logo">🍽️ <span>쩝쩝</span>박사</div>
    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="맛집, 셰프 검색..." oninput="applyFilters()" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div id="badge">100곳</div>
  </div>

  <!-- Filters -->
  <div id="filter-bar">
    <div class="chip all on" onclick="setCat('',this)">전체</div>
    <div class="chip white" onclick="setCat('백스트리트',this)">🏳️ 백스트리트</div>
    <div class="chip black" onclick="setCat('흑백요리사',this)">🏴 흑백요리사</div>
    <div class="chip my" onclick="setCat('직접저장',this)">⭐ 직접저장</div>
    <div class="divider"></div>
    <div class="chip region all on" onclick="setRegion('',this)">전국</div>
    <div class="chip region" onclick="setRegion('서울',this)">서울</div>
    <div class="chip region" onclick="setRegion('경기',this)">경기</div>
    <div class="chip region" onclick="setRegion('인천',this)">인천</div>
    <div class="chip region" onclick="setRegion('제주',this)">제주</div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- List View -->
  <div id="list-view"></div>

  <!-- Tab Bar -->
  <div id="tabbar">
    <div class="tab on" id="tab-map" onclick="switchTab('map')">
      <span class="tab-icon">🗺️</span>지도
    </div>
    <div class="tab" id="tab-list" onclick="switchTab('list')">
      <span class="tab-icon">📋</span>목록
    </div>
  </div>
</div>

<!-- Sheet -->
<div id="overlay" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="handle"></div>
  <div id="sheet-inner">
    <div id="sheet-tags"></div>
    <div id="sheet-name"></div>
    <div id="sheet-addr"></div>
    <div id="sheet-memo"></div>
    <div id="sheet-actions">
      <a id="kakao-link" class="action-btn primary" target="_blank">카카오맵으로 보기</a>
    </div>
  </div>
</div>

const CAT_COLORS = { '백스트리트':'#e8d5a3','흑백요리사':'#c084fc','직접저장':'#6ee7b7' };
const CAT_CLASS = { '백스트리트':'white','흑백요리사':'black','직접저장':'my' };
const CAT_ICON = { '백스트리트':'🏳️','흑백요리사':'🏴','직접저장':'⭐' };

// Map init
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([37.5665,126.978],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{ maxZoom:19 }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

function makeIcon(cat) {
  const c = CAT_COLORS[cat] || '#f5a623';
  return L.divIcon({
    html:`<div style="width:13px;height:13px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,0.5);box-shadow:0 2px 6px rgba(0,0,0,0.6)"></div>`,
    className:'', iconSize:[13,13], iconAnchor:[6,6]
  });
}

const cluster = L.markerClusterGroup({ maxClusterRadius:55, showCoverageOnHover:false, animate:true });
const markers = [];

PLACES.forEach(p => {
  if (!p.lat||!p.lng) return;
  const m = L.marker([p.lat,p.lng],{ icon:makeIcon(p.category) });
  m._p = p;
  m.on('click', () => openSheet(p));
  markers.push(m);
});
cluster.addLayers(markers);
map.addLayer(cluster);

let activeCat='', activeRegion='', filtered=[];

function setCat(val,el) {
  activeCat=val;
  document.querySelectorAll('.chip:not(.region)').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  applyFilters();
}
function setRegion(val,el) {
  activeRegion=val;
  document.querySelectorAll('.chip.region').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = markers.filter(m => {
    const p=m._p;
    return (!activeCat||p.category===activeCat)
      && (!activeRegion||p.region===activeRegion)
      && (!q||(p.name+p.memo+p.address).toLowerCase().includes(q));
  });
  cluster.clearLayers();
  cluster.addLayers(filtered);
  document.getElementById('badge').textContent = filtered.length+'곳';
  if (currentTab==='list') renderList();
  if (filtered.length>0 && filtered.length<=20 && q) {
    map.fitBounds(L.latLngBounds(filtered.map(m=>m.getLatLng())),{ padding:[60,60],maxZoom:15 });
  }
}

// Initially set filtered to all
filtered = [...markers];

function openSheet(p) {
  const cls = CAT_CLASS[p.category]||'my';
  const icon = CAT_ICON[p.category]||'📍';
  document.getElementById('sheet-tags').innerHTML = `
    <span class="stag ${cls}">${icon} ${p.category}</span>
    <span class="stag region-tag">${p.region||'기타'}${p.district?' '+p.district:''}</span>
  `;
  document.getElementById('sheet-name').textContent = p.name;
  document.getElementById('sheet-addr').textContent = p.address||'';
  const memo = p.memo||'';
  const memoEl = document.getElementById('sheet-memo');
  memoEl.style.display = memo ? 'block' : 'none';
  memoEl.textContent = memo;
  // Kakao maps link
  document.getElementById('kakao-link').href = `https://map.kakao.com/link/search/${encodeURIComponent(p.name)}`;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  // Pan map
  map.panTo([p.lat, p.lng], { animate:true, duration:0.5 });
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

// Swipe down to close sheet
let sheetStartY=0;
const sheetEl=document.getElementById('sheet');
sheetEl.addEventListener('touchstart',e=>sheetStartY=e.touches[0].clientY,{passive:true});
sheetEl.addEventListener('touchend',e=>{ if(e.changedTouches[0].clientY-sheetStartY>80) closeSheet(); },{passive:true});

// Tab switching
let currentTab='map';
function switchTab(tab) {
  currentTab=tab;
  document.getElementById('map').style.display = tab==='map'?'block':'none';
  document.getElementById('list-view').classList.toggle('on', tab==='list');
  document.getElementById('tab-map').classList.toggle('on', tab==='map');
  document.getElementById('tab-list').classList.toggle('on', tab==='list');
  if (tab==='list') renderList();
  else map.invalidateSize();
}

function renderList() {
  const listEl = document.getElementById('list-view');
  listEl.innerHTML = filtered.map(m => {
    const p=m._p;
    const c=CAT_COLORS[p.category]||'#f5a623';
    const sub = p.memo ? p.memo.slice(0,50) : p.address||'';
    return `<div class="list-item" onclick='openFromList(${JSON.stringify(p)})'>
      <div class="list-dot" style="background:${c}"></div>
      <div class="list-info">
        <div class="list-name">${p.name}</div>
        <div class="list-sub">${sub}</div>
      </div>
      <div class="list-region">${p.district||p.region||''}</div>
    </div>`;
  }).join('');
}

function openFromList(p) {
  switchTab('map');
  setTimeout(()=>openSheet(p),300);
}

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  if(!localStorage.getItem('install-dismissed'))
    document.getElementById('install-banner').classList.add('on');
});
document.getElementById('install-btn').onclick=async()=>{
  if(deferredPrompt){ deferredPrompt.prompt(); const r=await deferredPrompt.userChoice; if(r.outcome==='accepted') document.getElementById('install-banner').classList.remove('on'); }
  else {
    alert('Safari에서는 하단 공유 버튼 → "홈 화면에 추가"를 눌러주세요 📱');
  }
};
document.getElementById('dismiss-btn').onclick=()=>{
  document.getElementById('install-banner').classList.remove('on');
  localStorage.setItem('install-dismissed','1');
};

// SW register
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(r=>console.log('SW registered',r));
}
</script>
