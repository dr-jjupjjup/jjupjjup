async function geocode(name, address) {
  if (!address) return null;
  const clean = address.replace(/\s*\([^)]*\)/g, '').trim();
  
  // 주소로 먼저 시도
  try {
    const res = await fetch(
      'https://nominatim.openstreetmap.org/search?q=' + 
      encodeURIComponent(clean) + '&format=json&limit=1&countrycodes=kr',
      { headers: {'Accept-Language':'ko','User-Agent':'jjupjjup-geocoder/1.0'} }
    );
    const data = await res.json();
    if (data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) {}

  // 실패시 가게 이름 + 주소 앞부분으로 재시도
  try {
    const short = clean.split(' ').slice(0,4).join(' ');
    const res = await fetch(
      'https://nominatim.openstreetmap.org/search?q=' + 
      encodeURIComponent(name + ' ' + short) + '&format=json&limit=1&countrycodes=kr',
      { headers: {'Accept-Language':'ko','User-Agent':'jjupjjup-geocoder/1.0'} }
    );
    const data = await res.json();
    if (data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) {}

  return null;
}

async function start() {
  document.getElementById('btn').disabled = true;
  const success = [], failed = [];
  const total = PLACES.length;

  for (let i = 0; i < total; i++) {
    const p = PLACES[i];
    const coord = await geocode(p.name, p.address);

    if (coord) {
      success.push({ ...p, lat: coord.lat, lng: coord.lng });
      log(`✅ ${i+1}/${total} ${p.name}`);
    } else {
      failed.push(p);
      log(`❌ ${i+1}/${total} ${p.name} — 변환 실패`);
    }

    document.getElementById('bar').style.width = Math.round((i+1)/total*100) + '%';
    document.getElementById('status').innerHTML = 
      `🔄 변환 중... <b>${i+1}/${total}</b><br>✅ 성공: <b>${success.length}</b>개 &nbsp; ❌ 실패: <b>${failed.length}</b>개`;

    await new Promise(r => setTimeout(r, 200)); // Nominatim 속도 제한 준수
  }

  document.getElementById('status').innerHTML = 
    `🎉 완료! ✅ 성공: <b>${success.length}</b>개 &nbsp; ❌ 실패: <b>${failed.length}</b>개<br>파일이 자동 다운로드됩니다`;

  window._results = success;

  const blob = new Blob([JSON.stringify(success)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'geocoded_places.json';
  a.click();

  document.getElementById('btn').textContent = '💾 다시 다운로드';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').onclick = () => {
    const b = new Blob([JSON.stringify(window._results)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'geocoded_places.json';
    a.click();
  };
}
</script>
</body>
</html>
